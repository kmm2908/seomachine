name: Deploy seomachine.php

on:
  push:
    branches: [main]
    paths:
      - 'wordpress/seomachine.php'
      - 'wordpress/seomachine-hub.css'

jobs:
  deploy-gtm-gtb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GTM and GTB via SFTP
        run: |
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          sftp -i /tmp/deploy_key -P 18765 -o StrictHostKeyChecking=no u2168-sqqieazmgeuw@ukm1.siteground.biz << 'SFTP'
          put wordpress/seomachine.php www/glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          put wordpress/seomachine.php www/blog.glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/blog.glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          SFTP
          rm /tmp/deploy_key

  deploy-sdy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to SDY via SFTP
        run: |
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          sftp -i /tmp/deploy_key -P 18765 -o StrictHostKeyChecking=no u2732-2mxetksmslhk@gukm1055.siteground.biz << 'SFTP'
          put wordpress/seomachine.php www/serendipitymassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/serendipitymassage.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          put wordpress/seomachine.php www/staging2.serendipitymassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/staging2.serendipitymassage.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          SFTP
          rm /tmp/deploy_key

  deploy-tmg-tmb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to TMG and TMB via SFTP
        run: |
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          sftp -i /tmp/deploy_key -P 18765 -o StrictHostKeyChecking=no u3520-kztrwuly6pid@uk1001.siteground.eu << 'SFTP'
          put wordpress/seomachine.php www/thaimassagegreenock.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/thaimassagegreenock.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          put wordpress/seomachine.php www/blog.thaimassagegreenock.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine-hub.css www/blog.thaimassagegreenock.co.uk/public_html/wp-content/mu-plugins/seomachine-hub.css
          SFTP
          rm /tmp/deploy_key
