name: Deploy seomachine.php

on:
  push:
    branches: [main]
    paths:
      - 'wordpress/seomachine.php'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to all sites via SFTP
        run: |
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          sftp -i /tmp/deploy_key -P 18765 -o StrictHostKeyChecking=no u2732-2mxetksmslhk@gukm1055.siteground.biz << 'SFTP'
          put wordpress/seomachine.php /glasgowthaimassage.co.uk/glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine.php /glasgowthaimassage.co.uk/blog.glasgowthaimassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          put wordpress/seomachine.php /serendipitymassage.co.uk/serendipitymassage.co.uk/public_html/wp-content/mu-plugins/seomachine.php
          SFTP
          rm /tmp/deploy_key
